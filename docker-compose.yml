services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jet_tracker
      POSTGRES_PASSWORD: jet_tracker
      POSTGRES_DB: jet_tracker
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jet_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://jet_tracker:jet_tracker@db:5432/jet_tracker
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - photo_data:/app/photos
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - api

volumes:
  db_data:
  photo_data:
