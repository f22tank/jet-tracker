server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Using a variable in proxy_pass (rather than a bare
    # hostname) makes nginx resolve "api" per-request instead of once at startup —
    # otherwise nginx refuses to start at all if the api container isn't up yet
    # (or briefly restarts) when web starts/reloads.
    resolver 127.0.0.11 valid=30s;

    # FastAPI's own routes and static photo files — proxied through to the api
    # container so the browser only ever talks to this one origin.
    location /api/ {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /photos/ {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
    }

    # Client-side routing (SpotPage/AircraftPage/OperatorPage/etc. all live under
    # different paths but there's only one index.html) — fall back to it for any
    # path that isn't a real static file, so direct loads/refreshes don't 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
