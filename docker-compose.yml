services:
  api:
    build: ./backend
    environment:
      # Existing MariaDB instance on the LAN — not managed by this compose file.
      # Replace host/port/user/password/db with your real values.
      DATABASE_URL: mysql+pymysql://REPLACE_USER:REPLACE_PASSWORD@REPLACE_HOST:3306/REPLACE_DB_NAME
    ports:
      - "8000:8000"
    volumes:
      - photo_data:/app/photos
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  photo_data:
